<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星粒宇宙 · STELLAR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400;700&family=Noto+Sans+SC:wght@200;300;400&display=swap');

  :root {
    --accent: #00f5ff;
    --accent2: #ff00aa;
    --accent3: #7b2fff;
    --bg: #020408;
    --panel-bg: rgba(5,15,30,0.85);
    --border: rgba(0,245,255,0.18);
    --text: #c8e8ff;
    --glow: 0 0 20px rgba(0,245,255,0.4);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  #canvas-container {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  canvas#three-canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ── UI Panel ── */
  #ui-panel {
    position: fixed;
    left: 28px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .panel-card {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 16px;
    backdrop-filter: blur(20px);
    box-shadow: var(--glow), inset 0 1px 0 rgba(255,255,255,0.06);
    min-width: 148px;
  }

  .panel-title {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
    opacity: 0.8;
  }

  .model-btns {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .model-btn {
    background: rgba(0,245,255,0.05);
    border: 1px solid rgba(0,245,255,0.15);
    border-radius: 10px;
    padding: 9px 12px;
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px;
    font-weight: 300;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 1px;
  }

  .model-btn:hover {
    background: rgba(0,245,255,0.12);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 12px rgba(0,245,255,0.25);
    transform: translateX(3px);
  }

  .model-btn.active {
    background: rgba(0,245,255,0.18);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 16px rgba(0,245,255,0.35);
  }

  .btn-icon { font-size: 16px; }

  /* ── Status Indicator ── */
  #status-bar {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 10px 24px;
    backdrop-filter: blur(20px);
    box-shadow: var(--glow);
  }

  #gesture-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    animation: pulse 2s ease-in-out infinite;
    transition: background 0.3s, box-shadow 0.3s;
  }

  #gesture-dot.fist {
    background: var(--accent2);
    box-shadow: 0 0 14px var(--accent2);
    animation: pulse-fist 0.6s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.5; transform:scale(1.3); }
  }
  @keyframes pulse-fist {
    0%,100% { opacity:1; transform:scale(1.4); }
    50% { opacity:0.6; transform:scale(0.8); }
  }

  #gesture-label {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text);
  }

  #state-label {
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--accent);
    font-family: 'Orbitron', monospace;
    min-width: 60px;
  }

  /* ── Top right controls ── */
  #top-controls {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 10;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .ctrl-btn {
    width: 42px; height: 42px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items:center; justify-content:center;
    backdrop-filter: blur(20px);
    transition: all 0.2s;
    box-shadow: var(--glow);
  }

  .ctrl-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 18px rgba(0,245,255,0.4);
  }

  /* ── Title ── */
  #title-area {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    pointer-events: none;
  }

  #title-area h1 {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 8px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,245,255,0.6);
  }

  #title-area p {
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(200,232,255,0.35);
    margin-top: 3px;
  }

  /* camera hidden */
  #cam-video { display:none !important; }

  /* Loading overlay */
  #loading {
    position: fixed; inset:0;
    z-index: 100;
    background: var(--bg);
    display: flex; align-items:center; justify-content:center;
    flex-direction: column; gap: 20px;
    transition: opacity 0.8s ease;
  }

  #loading.fade-out { opacity: 0; pointer-events: none; }

  .load-ring {
    width: 60px; height: 60px;
    border: 2px solid rgba(0,245,255,0.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .load-text {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
  }

  /* color selector */
  .color-btns {
    display: flex;
    gap: 6px;
    margin-top: 2px;
    flex-wrap: wrap;
  }

  .color-swatch {
    width: 22px; height: 22px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.2s, border-color 0.2s;
  }

  .color-swatch:hover, .color-swatch.active {
    transform: scale(1.25);
    border-color: #fff;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="load-ring"></div>
  <div class="load-text">INITIALIZING · 星粒</div>
</div>

<div id="canvas-container">
  <canvas id="three-canvas"></canvas>
</div>

<video id="cam-video" playsinline autoplay muted></video>

<div id="title-area">
  <h1>STELLAR</h1>
  <p>星粒宇宙粒子系统</p>
</div>

<div id="ui-panel">
  <div class="panel-card">
    <div class="panel-title">模型选择</div>
    <div class="model-btns">
      <button class="model-btn active" data-model="heart">
        <span class="btn-icon">♡</span> 爱心
      </button>
      <button class="model-btn" data-model="sphere">
        <span class="btn-icon">◎</span> 圆球
      </button>
      <button class="model-btn" data-model="torus">
        <span class="btn-icon">⊚</span> 圆环
      </button>
      <button class="model-btn" data-model="star">
        <span class="btn-icon">✦</span> 星形
      </button>
      <button class="model-btn" data-model="dna">
        <span class="btn-icon">⌬</span> DNA
      </button>
    </div>
  </div>

  <div class="panel-card">
    <div class="panel-title">粒子色彩</div>
    <div class="color-btns">
      <div class="color-swatch active" data-palette="cyan" style="background:linear-gradient(135deg,#00f5ff,#7b2fff)"></div>
      <div class="color-swatch" data-palette="rose" style="background:linear-gradient(135deg,#ff00aa,#ff6b35)"></div>
      <div class="color-swatch" data-palette="gold" style="background:linear-gradient(135deg,#ffd700,#ff8c00)"></div>
      <div class="color-swatch" data-palette="green" style="background:linear-gradient(135deg,#00ff88,#00ccff)"></div>
      <div class="color-swatch" data-palette="white" style="background:linear-gradient(135deg,#ffffff,#aaccff)"></div>
    </div>
  </div>
</div>

<div id="status-bar">
  <div id="gesture-dot"></div>
  <span id="gesture-label">摄像头检测中</span>
  <span id="state-label">聚拢</span>
</div>

<div id="top-controls">
  <button class="ctrl-btn" id="fullscreen-btn" title="全屏">⛶</button>
  <button class="ctrl-btn" id="cam-toggle" title="开启摄像头">📷</button>
</div>

<!-- Three.js + MediaPipe -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─────────────────────────────────────────────
// PALETTES
// ─────────────────────────────────────────────
const PALETTES = {
  cyan:  { a: new THREE.Color(0x00f5ff), b: new THREE.Color(0x7b2fff), c: new THREE.Color(0x00aaff) },
  rose:  { a: new THREE.Color(0xff00aa), b: new THREE.Color(0xff6b35), c: new THREE.Color(0xff44cc) },
  gold:  { a: new THREE.Color(0xffd700), b: new THREE.Color(0xff8c00), c: new THREE.Color(0xffee44) },
  green: { a: new THREE.Color(0x00ff88), b: new THREE.Color(0x00ccff), c: new THREE.Color(0x44ffaa) },
  white: { a: new THREE.Color(0xffffff), b: new THREE.Color(0xaaccff), c: new THREE.Color(0xddeeff) },
};
let currentPalette = 'cyan';

// ─────────────────────────────────────────────
// THREE SETUP
// ─────────────────────────────────────────────
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x020408, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.z = 220;

// ─────────────────────────────────────────────
// PARTICLE SYSTEM
// ─────────────────────────────────────────────
const COUNT = 6000;
const positions   = new Float32Array(COUNT * 3);
const targets     = new Float32Array(COUNT * 3);
const scattered   = new Float32Array(COUNT * 3);
const colors      = new Float32Array(COUNT * 4);
const sizes       = new Float32Array(COUNT);
const velocities  = new Float32Array(COUNT * 3); // for scatter dynamics
const phases      = new Float32Array(COUNT);

// Initialize
for (let i = 0; i < COUNT; i++) {
  phases[i] = Math.random() * Math.PI * 2;
  sizes[i] = 0.5 + Math.random() * 2.5;
  // start at random sphere
  const theta = Math.random() * Math.PI * 2;
  const phi   = Math.acos(2 * Math.random() - 1);
  const r     = 60 + Math.random() * 40;
  positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
  positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  positions[i*3+2] = r * Math.cos(phi);
}

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geo.setAttribute('aColor',   new THREE.BufferAttribute(colors, 4));
geo.setAttribute('aSize',    new THREE.BufferAttribute(sizes, 1));

const particleMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime:     { value: 0 },
    uScatter:  { value: 0 },   // 0=gathered, 1=scattered
  },
  vertexShader: `
    attribute vec4 aColor;
    attribute float aSize;
    varying vec4 vColor;
    uniform float uTime;
    uniform float uScatter;
    void main(){
      vColor = aColor;
      vec4 mvPos = modelViewMatrix * vec4(position,1.0);
      float dist = length(mvPos.xyz);
      gl_PointSize = aSize * (300.0 / -mvPos.z) * (1.0 + 0.15*sin(uTime*2.0 + dist*0.05));
      gl_Position = projectionMatrix * mvPos;
    }
  `,
  fragmentShader: `
    varying vec4 vColor;
    void main(){
      vec2 uv = gl_PointCoord * 2.0 - 1.0;
      float d = dot(uv,uv);
      if(d > 1.0) discard;
      float alpha = (1.0 - sqrt(d)) * vColor.a;
      // glow core
      float core = smoothstep(0.4, 0.0, sqrt(d));
      vec3 col = vColor.rgb + vec3(core * 0.5);
      gl_FragColor = vec4(col, alpha);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexColors: false,
});

const particles = new THREE.Points(geo, particleMat);
scene.add(particles);

// ─────────────────────────────────────────────
// MODEL GENERATORS
// ─────────────────────────────────────────────
function genSphere(i, total) {
  const phi = Math.acos(1 - 2 * (i + 0.5) / total);
  const theta = Math.PI * (1 + Math.sqrt(5)) * i;
  const r = 80 + (Math.random() - 0.5) * 8;
  return [
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.sin(phi) * Math.sin(theta),
    r * Math.cos(phi),
  ];
}

function genHeart(i, total) {
  const t = (i / total) * Math.PI * 2;
  const layers = Math.floor(i / (total / 40));
  const z = (layers / 40 - 0.5) * 70;
  const scale = Math.sqrt(1 - Math.pow(z / 35, 2)) * 55;
  const x = scale * 16 * Math.pow(Math.sin(t), 3) / 16;
  const y = scale * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) / 16;
  return [x, y - 20, z + (Math.random()-0.5)*6];
}

function genTorus(i, total) {
  const R = 70, r = 22;
  const u = (i / total) * Math.PI * 2;
  const v = ((i * 7) % total / total) * Math.PI * 2;
  return [
    (R + r * Math.cos(v)) * Math.cos(u),
    (R + r * Math.cos(v)) * Math.sin(u),
    r * Math.sin(v) + (Math.random()-0.5)*5,
  ];
}

function genStar(i, total) {
  const phi   = Math.acos(1 - 2 * (i / total));
  const theta = Math.PI * (1 + Math.sqrt(5)) * i;
  const spikes = 5;
  const angle = theta % (Math.PI * 2 / spikes);
  const frac   = angle / (Math.PI / spikes);
  const r = 85 * (frac < 1 ? THREE.MathUtils.lerp(0.5, 1, frac) : THREE.MathUtils.lerp(1, 0.5, frac-1));
  return [
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.sin(phi) * Math.sin(theta),
    r * Math.cos(phi) * 0.35,
  ];
}

function genDNA(i, total) {
  const t = (i / total) * Math.PI * 8;
  const strand = i % 2;
  const offset = strand * Math.PI;
  const radius = 30;
  const height = ((i / total) - 0.5) * 160;
  const x = radius * Math.cos(t + offset);
  const z = radius * Math.sin(t + offset);
  const y = height;
  // rungs
  if (i % 60 < 4) {
    const frac = (i % 60) / 4;
    return [
      THREE.MathUtils.lerp(-radius * Math.cos(t), radius * Math.cos(t), frac),
      height,
      THREE.MathUtils.lerp(-radius * Math.sin(t), radius * Math.sin(t), frac),
    ];
  }
  return [x + (Math.random()-0.5)*4, y, z + (Math.random()-0.5)*4];
}

const MODEL_GEN = { sphere: genSphere, heart: genHeart, torus: genTorus, star: genStar, dna: genDNA };
let currentModel = 'heart';

function computeTargets(model) {
  const gen = MODEL_GEN[model] || genSphere;
  for (let i = 0; i < COUNT; i++) {
    const [x, y, z] = gen(i, COUNT);
    targets[i*3]   = x;
    targets[i*3+1] = y;
    targets[i*3+2] = z;
  }
}

function computeScattered() {
  const W = window.innerWidth, H = window.innerHeight;
  for (let i = 0; i < COUNT; i++) {
    const side = Math.floor(Math.random() * 4);
    let x, y, z;
    // Map screen edges to 3D
    const depth = (Math.random() - 0.5) * 500;
    const edgeDist = 120 + Math.random() * 200;
    if (side === 0) { x = (Math.random()*2-1)*edgeDist*1.8; y =  edgeDist + Math.random()*100; z = depth; }
    else if (side === 1) { x = (Math.random()*2-1)*edgeDist*1.8; y = -edgeDist - Math.random()*100; z = depth; }
    else if (side === 2) { x = edgeDist*1.8 + Math.random()*120; y = (Math.random()*2-1)*edgeDist; z = depth; }
    else { x = -edgeDist*1.8 - Math.random()*120; y = (Math.random()*2-1)*edgeDist; z = depth; }
    scattered[i*3]   = x;
    scattered[i*3+1] = y;
    scattered[i*3+2] = z;
    // random velocities for scatter burst
    velocities[i*3]   = (x > 0 ? 1 : -1) * (2 + Math.random()*3);
    velocities[i*3+1] = (y > 0 ? 1 : -1) * (2 + Math.random()*3);
    velocities[i*3+2] = (Math.random()-0.5)*3;
  }
}

computeTargets(currentModel);
computeScattered();

// ─────────────────────────────────────────────
// ANIMATION STATE
// ─────────────────────────────────────────────
let isScattered = false;
let transitionProgress = 0; // 0=gathered, 1=scattered
let transitionDir = 0; // +1 or -1
const TRANSITION_DUR = 2.0; // seconds
let rotY = 0;

function updateColors() {
  const pal = PALETTES[currentPalette];
  for (let i = 0; i < COUNT; i++) {
    const t = i / COUNT;
    const c = t < 0.5
      ? new THREE.Color().lerpColors(pal.a, pal.b, t * 2)
      : new THREE.Color().lerpColors(pal.b, pal.c, (t - 0.5) * 2);
    colors[i*4]   = c.r;
    colors[i*4+1] = c.g;
    colors[i*4+2] = c.b;
    colors[i*4+3] = 0.8 + Math.random() * 0.2;
  }
  geo.attributes.aColor.needsUpdate = true;
}
updateColors();

// ─────────────────────────────────────────────
// EASING
// ─────────────────────────────────────────────
function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
}

function easeOutExpo(t) {
  return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
}

// ─────────────────────────────────────────────
// RENDER LOOP
// ─────────────────────────────────────────────
let lastTime = 0;
let clock = { elapsed: 0 };

function animate(ts) {
  requestAnimationFrame(animate);
  const dt = Math.min((ts - lastTime) * 0.001, 0.05);
  lastTime = ts;
  clock.elapsed += dt;

  // Update transition
  if (transitionDir !== 0) {
    transitionProgress += transitionDir * dt / TRANSITION_DUR;
    transitionProgress = Math.max(0, Math.min(1, transitionProgress));
    if (transitionProgress <= 0 || transitionProgress >= 1) transitionDir = 0;
  }

  const ep = easeInOutCubic(transitionProgress);

  // Slow rotation when gathered
  rotY += dt * 0.18 * (1 - ep * 0.7);
  particles.rotation.y = rotY;
  particles.rotation.x = Math.sin(clock.elapsed * 0.07) * 0.12;

  // Particle positions
  const pos = geo.attributes.position;
  for (let i = 0; i < COUNT; i++) {
    const tx = targets[i*3],  ty = targets[i*3+1],  tz = targets[i*3+2];
    const sx = scattered[i*3], sy = scattered[i*3+1], sz = scattered[i*3+2];

    // Breathing oscillation when gathered
    const breath = Math.sin(clock.elapsed * 1.5 + phases[i]) * 2.0 * (1 - ep);

    const gx = tx + Math.sin(clock.elapsed * 0.5 + phases[i]) * 1.5 * (1-ep) + breath * 0.3;
    const gy = ty + Math.cos(clock.elapsed * 0.4 + phases[i] * 1.3) * 1.5 * (1-ep) + breath * 0.3;
    const gz = tz + Math.sin(clock.elapsed * 0.6 + phases[i] * 0.7) * 1.5 * (1-ep);

    pos.array[i*3]   = gx + (sx - gx) * ep;
    pos.array[i*3+1] = gy + (sy - gy) * ep;
    pos.array[i*3+2] = gz + (sz - gz) * ep;

    // Twinkle alpha
    colors[i*4+3] = (0.6 + 0.4 * Math.sin(clock.elapsed * 2 + phases[i])) * (ep > 0.5 ? 0.5 + (1-ep) : 0.8);
  }
  pos.needsUpdate = true;
  geo.attributes.aColor.needsUpdate = true;

  particleMat.uniforms.uTime.value = clock.elapsed;
  particleMat.uniforms.uScatter.value = ep;

  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

// ─────────────────────────────────────────────
// GESTURE CONTROL
// ─────────────────────────────────────────────
let handDetectionActive = false;
let lastGestureState = 'none'; // 'fist' | 'open' | 'none'

const gestureLabel = document.getElementById('gesture-label');
const gestureDoc = document.getElementById('gesture-dot');
const stateLabel = document.getElementById('state-label');

function setScatter(scatter) {
  if (scatter && !isScattered) {
    isScattered = true;
    transitionDir = 1;
    computeScattered();
    stateLabel.textContent = '发散';
    stateLabel.style.color = 'var(--accent2)';
    gestureDoc.classList.add('fist');
  } else if (!scatter && isScattered) {
    isScattered = false;
    transitionDir = -1;
    stateLabel.textContent = '聚拢';
    stateLabel.style.color = 'var(--accent)';
    gestureDoc.classList.remove('fist');
  }
}

// Load MediaPipe Hands
async function initCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode:'user', width:320, height:240 } });
    const video = document.getElementById('cam-video');
    video.srcObject = stream;
    await video.play();

    // Dynamically load MediaPipe
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js';
    script.crossOrigin = 'anonymous';
    document.head.appendChild(script);

    script.onload = async () => {
      const handsLib = window.Hands;
      if (!handsLib) { fallbackGesture(); return; }
      const hands = new handsLib({
        locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${f}`,
      });
      hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.6, minTrackingConfidence: 0.5 });

      hands.onResults((results) => {
        if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
          if (lastGestureState !== 'none') {
            lastGestureState = 'none';
            gestureLabel.textContent = '未检测到手';
            setScatter(false);
          }
          return;
        }
        const lm = results.multiHandLandmarks[0];
        const isFist = detectFist(lm);
        if (isFist && lastGestureState !== 'fist') {
          lastGestureState = 'fist';
          gestureLabel.textContent = '握拳 · 发散';
          setScatter(true);
        } else if (!isFist && lastGestureState !== 'open') {
          lastGestureState = 'open';
          gestureLabel.textContent = '张开手掌 · 聚拢';
          setScatter(false);
        }
      });

      // Process frames
      handDetectionActive = true;
      document.getElementById('cam-toggle').textContent = '🟢';
      gestureLabel.textContent = '摄像头已开启';

      async function processFrame() {
        if (!handDetectionActive) return;
        await hands.send({ image: video });
        requestAnimationFrame(processFrame);
      }
      processFrame();
    };
    script.onerror = () => { gestureLabel.textContent = '手势库加载失败·键盘控制'; fallbackGesture(); };

  } catch(e) {
    console.warn('Camera failed:', e);
    gestureLabel.textContent = '无摄像头·键盘控制';
    fallbackGesture();
  }
}

function detectFist(lm) {
  // Check if fingers are curled by comparing tip vs MCP y positions
  const fingerTips   = [8,12,16,20];
  const fingerMCPs   = [5,9,13,17];
  let curledCount = 0;
  for (let f = 0; f < 4; f++) {
    const tip = lm[fingerTips[f]];
    const mcp = lm[fingerMCPs[f]];
    // In normalized coords: if tip.y > mcp.y (lower on screen), finger is bent
    if (tip.y > mcp.y - 0.02) curledCount++;
  }
  return curledCount >= 3;
}

function fallbackGesture() {
  gestureLabel.textContent = '按 Space = 发散 / 聚拢';
}

// Keyboard fallback
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    setScatter(!isScattered);
  }
});

// ─────────────────────────────────────────────
// MODEL SWITCHING
// ─────────────────────────────────────────────
document.querySelectorAll('.model-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentModel = btn.dataset.model;
    computeTargets(currentModel);
    // Briefly scatter and re-gather for dramatic effect
    if (!isScattered) {
      computeScattered();
      const wasScattered = isScattered;
      isScattered = true; transitionDir = 1;
      setTimeout(() => { isScattered = false; transitionDir = -1; stateLabel.textContent = '聚拢'; }, 600);
    }
  });
});

// ─────────────────────────────────────────────
// COLOR SWATCHES
// ─────────────────────────────────────────────
document.querySelectorAll('.color-swatch').forEach(sw => {
  sw.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    currentPalette = sw.dataset.palette;
    updateColors();
  });
});

// ─────────────────────────────────────────────
// FULLSCREEN
// ─────────────────────────────────────────────
document.getElementById('fullscreen-btn').addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    document.getElementById('fullscreen-btn').textContent = '✕';
  } else {
    document.exitFullscreen();
    document.getElementById('fullscreen-btn').textContent = '⛶';
  }
});

// Camera toggle
document.getElementById('cam-toggle').addEventListener('click', () => {
  if (!handDetectionActive) {
    initCamera();
  }
});

// ─────────────────────────────────────────────
// RESIZE
// ─────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─────────────────────────────────────────────
// STARTUP
// ─────────────────────────────────────────────
setTimeout(() => {
  const loading = document.getElementById('loading');
  loading.classList.add('fade-out');
  setTimeout(() => loading.remove(), 800);
}, 1400);

// Init target positions
computeTargets('heart');
// Copy targets to positions initially
for (let i = 0; i < COUNT * 3; i++) positions[i] = targets[i];
geo.attributes.position.needsUpdate = true;
</script>
</body>
